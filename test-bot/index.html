<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Black Box Test Bot</title>
  <style>
    body { font-family: sans-serif; display: flex; margin: 0; background: #1e293b; color: white; height: 100vh; overflow: hidden; }
    #panel { width: 350px; padding: 20px; border-right: 1px solid #334155; height: 100vh; overflow-y: auto; box-sizing: border-box; }
    #game-wrapper { flex: 1; display: flex; justify-content: center; align-items: center; background: #0f172a; height: 100vh; overflow: hidden; padding: 20px; box-sizing: border-box; }
    iframe { height: 100%; max-height: 900px; aspect-ratio: 9/16; border: 2px solid #38bdf8; border-radius: 10px; background: #000; }
    button { display: block; width: 100%; padding: 10px; margin-bottom: 10px; cursor: pointer; background: #3b82f6; color: white; border: none; border-radius: 5px; font-weight: bold; }
    button:hover { background: #2563eb; }
    button:disabled { background: #475569; cursor: not-allowed; }
    .log-box { margin-top: 20px; padding: 10px; background: #0f172a; border-radius: 5px; height: calc(100vh - 250px); overflow-y: auto; font-family: monospace; font-size: 12px; }
    .log-entry { margin-bottom: 5px; border-bottom: 1px solid #334155; padding-bottom: 5px; }
    .success { color: #4ade80; }
    .error { color: #f87171; }
    .info { color: #60a5fa; }
  </style>
</head>
<body>

  <div id="panel">
    <h2>Test Dashboard</h2>
    <button id="btn-login">1. Auto Login (User: TestBot)</button>
    <button id="btn-test-tc-sc-02">2. Run TC-SC-02 (3-Chain Test)</button>
    <button id="btn-test-tc-pz-01">3. Run TC-PZ-01 (Pause Test)</button>
    
    <div class="log-box" id="log-box"></div>
  </div>

  <div id="game-wrapper">
    <!-- Same domain iframe to bypass CORS and allow DOM event injection -->
    <iframe id="game-iframe" src="../index.html"></iframe>
  </div>

  <script src="bot.js"></script>
</body>
</html>
